---
- name: Deploy VM for EDA testing
  hosts: local
  connection: local
  gather_facts: true
  tags:
    - infra
  vars_files:
    - ../group_vars/all.yml
  vars:
    inventory_dir: "../inventory"
    inventory_file: "{{ inventory_dir }}/inventory.yml"

  tasks:
    - name: Create EDA test VM
      aleksey_dubrovin.yc_obs_toolkit.yc_vm:
        name_prefix: "eda-test"
        folder_id: "{{ yc_folder_id }}"
        subnet_name: "{{ yc_subnet_name }}"
        zone: "{{ vm_zone }}"
        image_family: "{{ vm_image_family }}"
        ssh_key_path: "{{ vm_ssh_key_path }}"
        vm_user: "{{ vm_default_user }}"
        assign_public_ip: "{{ vm_assign_public_ip }}"
        cores: "{{ vm_cores }}"
        memory: "{{ vm_memory }}"
        disk_size: "{{ vm_disk_size }}"
        disk_type: "{{ vm_disk_type }}"
        preemptible: "{{ vm_preemptible }}"
        labels:
          ansible_group: eda_test     # ← исправлено: убрал дефис
          role: eda
      tags:
        - create_vms
      register: eda_test_vm

    - name: Generate dynamic inventory
      aleksey_dubrovin.yc_obs_toolkit.yc_inventory:
        folder_id: "{{ yc_folder_id }}"
        service_account_key: "{{ yc_service_account_key | default(omit) }}"
        output_dir: "{{ inventory_dir }}"
        ansible_user: "{{ vm_default_user }}"
        ansible_ssh_private_key_file: "{{ vm_ssh_private_key | default(lookup('env', 'HOME') + '/.ssh/aleksey') }}"
        group_by:
          - ansible_group
          - role
      tags:
        - inventory
      register: inventory_result

- name: Test file_writer module
  hosts: eda_test                # ← исправлено: eda-test → eda_test
  become: true
  gather_facts: true
  tags:
    - test
  roles:
    - role: file_writer_role
      vars:
        file_writer_path: /tmp/eda_monitor_test.txt
        file_writer_content: |
          EDA test file
          Created at: {{ ansible_facts.date_time.iso8601 }}    # ← исправлено
          Hostname: {{ ansible_facts.hostname }}               # ← исправлено