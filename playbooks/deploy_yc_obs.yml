---
- name: Deploy observability stack on Yandex Cloud
  hosts: localhost
  connection: local
  gather_facts: true
  vars_files:
    ../group_vars/all.yml
  vars:
    timestamp: "{{ ansible_date_time.epoch }}"

  tasks:
    - name: Fail if no credentials provided
      fail:
        msg: |
          Please set environment variables:
            export YC_FOLDER_ID="b1gxxxxxxxxxxxx"
            export YC_SUBNET_NAME="net-ru-central1-b"
      when: 
        - not yc_folder_id
        - not yc_subnet_name

    - name: Create ClickHouse VM
      aleksey_dubrovin.yc_obs_toolkit.yc_vm:
        name: "clickhouse-{{ timestamp }}"
        folder_id: "{{ yc_folder_id }}"
        subnet_name: "{{ yc_subnet_name }}"
        zone: "{{ vm_zone }}"
        ssh_key_path: "{{ vm_ssh_key_path }}"
        vm_user: "{{ vm_default_user }}"
        service_account_key: "{{ yc_service_account_key | default(omit) }}"
        assign_public_ip: "{{ vm_assign_public_ip }}"
        cores: "{{ vm_cores }}"
        memory: "{{ vm_memory }}"
        disk_size: "{{ vm_disk_size }}"
        disk_type: "{{ vm_disk_type }}"
        preemptible: "{{ vm_preemptible }}"
      register: clickhouse_vm

    - name: Create Vector VM
      aleksey_dubrovin.yc_obs_toolkit.yc_vm:
        name: "vector-{{ timestamp }}"
        folder_id: "{{ yc_folder_id }}"
        subnet_name: "{{ yc_subnet_name }}"
        zone: "{{ vm_zone }}"
        ssh_key_path: "{{ vm_ssh_key_path }}"
        vm_user: "{{ vm_default_user }}"
        service_account_key: "{{ yc_service_account_key | default(omit) }}"
        assign_public_ip: "{{ vm_assign_public_ip }}"
        cores: "{{ vm_cores }}"
        memory: "{{ vm_memory }}"
        disk_size: "{{ vm_disk_size }}"
        disk_type: "{{ vm_disk_type }}"
        preemptible: "{{ vm_preemptible }}"
      register: vector_vm

    - name: Create Lighthouse VM
      aleksey_dubrovin.yc_obs_toolkit.yc_vm:
        name: "lighthouse-{{ timestamp }}"
        folder_id: "{{ yc_folder_id }}"
        subnet_name: "{{ yc_subnet_name }}"
        zone: "{{ vm_zone }}"
        ssh_key_path: "{{ vm_ssh_key_path }}"
        vm_user: "{{ vm_default_user }}"
        service_account_key: "{{ yc_service_account_key | default(omit) }}"
        assign_public_ip: "{{ vm_assign_public_ip }}"
        cores: "{{ vm_cores }}"
        memory: "{{ vm_memory }}"
        disk_size: "{{ vm_disk_size }}"
        disk_type: "{{ vm_disk_type }}"
        preemptible: "{{ vm_preemptible }}"
      register: lighthouse_vm

    - name: Generate dynamic inventory
      aleksey_dubrovin.yc_obs_toolkit.yc_inventory:
        folder_id: "{{ yc_folder_id }}"
        service_account_key: "{{ yc_service_account_key | default(omit) }}"
        output_file: "{{ inventory_output_file }}"
        ansible_user: "{{ vm_default_user }}"
        group_by:
          - ansible_group
          - role

- name: Deploy ClickHouse
  hosts: clickhouse
  become: true
  roles:
    - role: clickhouse
      vars:
        clickhouse_version: "{{ clickhouse_version }}"
        clickhouse_users: "{{ clickhouse_users }}"
        clickhouse_dbs: "{{ clickhouse_dbs }}"

- name: Deploy Vector
  hosts: vector
  become: true
  roles:
    - role: vector
      vars:
        clickhouse_host: "{{ hostvars[groups['clickhouse'][0]]['ansible_host'] }}"
        clickhouse_port: "{{ vector_clickhouse_port }}"
        clickhouse_database: "{{ vector_clickhouse_database }}"
        clickhouse_table: "{{ vector_clickhouse_table }}"

- name: Deploy Lighthouse
  hosts: lighthouse
  become: true
  roles:
    - role: lighthouse
      vars:
        clickhouse_host: "{{ hostvars[groups['clickhouse'][0]]['ansible_host'] }}"

- name: Test file_writer module
  hosts: all
  become: true
  roles:
    - role: file_writer_role
      vars:
        file_writer_path: /tmp/observability_test.txt
        file_writer_content: |
          Observability stack deployed successfully!
          Timestamp: {{ ansible_date_time.iso8601 }}
          Hostname: {{ ansible_hostname }}